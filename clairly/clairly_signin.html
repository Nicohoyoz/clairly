<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clairly - Sign In</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/quil-display');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            position: relative;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #ff1744 0%, #ff6b9d 25%, #ffa6c9 50%, #ff4569 75%, #d32f2f 100%);
            filter: blur(60px);
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
                transform: scale(1);
            }
            50% {
                background-position: 100% 50%;
                transform: scale(1.1);
            }
            100% {
                background-position: 0% 50%;
                transform: scale(1);
            }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.15), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 182, 193, 0.2), transparent 50%);
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            gap: 30px;
            align-items: center;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-weight: 600;
            font-size: 18px;
            color: rgba(0, 0, 0, 0.7);
            letter-spacing: -0.5px;
        }

        .nav-container a {
            text-decoration: none;
            color: rgba(0, 0, 0, 0.6);
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-container a:hover {
            color: rgba(0, 0, 0, 0.9);
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signin-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signin-title {
            font-family: 'Quil Display', serif;
            font-size: 32px;
            font-weight: 500;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        .signin-subtitle {
            font-family: 'Quil Display', serif;
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 40px;
        }

        .sso-button {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .sso-button:hover {
            background: rgba(255, 255, 255, 0.45);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .sso-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .google-button {
            width: 100%;
            padding: 16px;
            background: white;
            border: none;
            border-radius: 15px;
            font-size: 15px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.8);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .google-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .signup-link {
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }

            .nav-container {
                padding: 10px 20px;
                gap: 20px;
            }

            .signin-card {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="overlay"></div>

    <nav>
        <div class="nav-container">
            <span class="logo" onclick="window.location.href='clairly_landing.html'" style="cursor: pointer;">clairly</span>
            <a href="clairly_landing.html">home</a>
            <a href="clairly_about.html">about</a>
            <a href="clairly_chat.html">chat</a>
            <a href="clairly_signin.html">sign in</a>
        </div>
    </nav>

    <div class="container">
        <div class="signin-card">
            <h1 class="signin-title">welcome back.</h1>
            <p class="signin-subtitle">sign in to continue to clairly</p>

            <button class="sso-button" id="nestButton">
                <span class="sso-icon">🪺</span>
                continue with montclair nest
            </button>

            <button class="google-button" id="googleButton">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                continue with google
            </button>

            <div class="signup-link">
                by signing in, you agree to our terms of service
            </div>
        </div>
    </div>

    <script>
        document.getElementById('nestButton').addEventListener('click', () => {
            // Redirect to Montclair Nest SSO
            window.location.href = 'https://sso.montclair.edu/cas/login';
        });

        document.getElementById('googleButton').addEventListener('click', () => {
            // Add your Google sign-in logic here
            console.log('Google sign in clicked');
        });
    </script>
</body>
</html>
